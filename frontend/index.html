<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Ensures proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node.js Foundation Web App</title>
  </head>
  <body>
    <!--
      React mounts the entire application inside this single div.
      This is the "root" DOM node — React replaces its content with
      the component tree rendered by App.jsx.
    -->
    <div id="root"></div>

    <!--
      Vite injects the compiled JS bundle here at build time.
      The type="module" attribute tells the browser to treat this as
      an ES Module, enabling modern JavaScript features like import/export.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
